  <script>
    (function() {
      var loc  = window.location;
      var path = loc.pathname.replace(/\/$/, '');   // remove trailing slash
      var hash = loc.hash.slice(1);                    // drop leading #

      /*
        Old path-style: /ShadyURL/theme/step/.../#base64
        The hash has the base64. The path has the theme + segments.
      */
      var segs = path.split('/').filter(Boolean);     // e.g. ['ShadyURL','theme','step','verify']
      // Remove repo name (first segment) to get the shady path body
      segs.shift();

      var newHash = segs.join('/');
      if (hash) newHash += (newHash ? '/' : '') + hash;

      var newUrl = loc.origin + '/' + (loc.pathname.split('/')[1] || 'ShadyURL') + '/#' + newHash;
      window.location.replace(newUrl);
    })();
  </script>
</head>
<body style="background:#f1f3f4;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
  <div style="background:#fff;border:1px solid #dadce0;border-radius:8px;padding:28px 32px;max-width:480px;width:90%;box-shadow:0 1px 4px rgba(0,0,0,0.08);">

        <div style="font-size:18px;font-weight:600;color:#202124;">Redirecting...</div>
        <div style="font-size:13px;color:#5f6368;margin-top:4px;">Taking you to the security check page.</div>
      </div>
    </div>
    <div style="height:4px;background:#e8eaed;border-radius:2px;overflow:hidden;">
      <div style="height:100%;width:30%;background:#1a73e8;border-radius:2px;animation:load404 1.2s ease-in-out infinite alternate;"></div>
    </div>
  </div>
  <style>
    @keyframes load404 { from { width: 10%; } to { width: 80%; } }
  </style>
