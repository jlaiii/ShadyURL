<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShadyURL — Make Your Links Look Sketchy</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #111;
      --accent: #ff3333;
      --accent2: #ff6600;
      --text: #e0e0e0;
      --muted: #888;
      --border: #222;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.9rem 1rem;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1.2rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .result-box {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #0a0a0a;
      border: 1px dashed var(--border);
      border-radius: 10px;
      word-break: break-all;
      font-family: monospace;
      font-size: 0.85rem;
      color: #00ff88;
      display: none;
      max-height: 180px;
      overflow-y: auto;
    }
    .actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.8rem;
    }
    .actions button {
      flex: 1;
      padding: 0.6rem;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
    }
    .actions button:hover { background: #222; }
    .warn {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
    .warn a { color: var(--accent); }
    .meta {
      display: flex;
      gap: 1rem;
    }
    .meta > div { flex: 1; }
  </style>
</head>
<body>
  <div class="logo">ShadyURL</div>
  <div class="tagline">Make your links look sketchy as hell. Perfect for pranking friends.</div>

  <div class="card">
    <label for="url">Target URL</label>
    <input id="url" type="url" placeholder="https://youtube.com" autocomplete="off">

    <div class="meta">
      <div>
        <label for="theme">Shady Theme</label>
        <select id="theme">
          <option value="">🎲 Random</option>
          <option value="download-free-creditcard-generator">download-free-creditcard-generator</option>

          <option value="login-paypal-confirm-identity">login-paypal-confirm-identity</option>
          <option value="install-trojan-hack-tool">install-trojan-hack-tool</option>
          <option value="darkweb-market-access-key">darkweb-market-access-key</option>
          <option value="claim-your-free-bitcoin">claim-your-free-bitcoin</option>
          <option value="update-social-security-info">update-social-security-info</option>
          <option value="activate-windows-crack">activate-windows-crack</option>
          <option value="free-vbucks-generator-2026">free-vbucks-generator-2026</option>
          <option value="steal-wifi-password-tool">steal-wifi-password-tool</option>
          <option value="access-neighbor-camera-feed">access-neighbor-camera-feed</option>

          <option value="run-unknown-exe-file">run-unknown-exe-file</option>
          <option value="enable-remote-desktop-backdoor">enable-remote-desktop-backdoor</option>
          <option value="free-porn-passwords-list">free-porn-passwords-list</option>
          <option value="claim-lottery-winnings-now">claim-lottery-winnings-now</option>
          <option value="verify-irs-tax-refund">verify-irs-tax-refund</option>
          <option value="unlock-stolen-iphone-free">unlock-stolen-iphone-free</option>
          <option value="ransomware-decrypt-payment">ransomware-decrypt-payment</option>
          <option value="stolen-passport-for-sale">stolen-passport-for-sale</option>
          <option value="your-computer-is-infected-click-here">your-computer-is-infected-click-here</option>
          <option value="confirm-suspicious-wire-transfer">confirm-suspicious-wire-transfer</option>
          <option value="unlock-exclusive-adult-content">unlock-exclusive-adult-content</option>
          <option value="download-nigerian-prince-documents">download-nigerian-prince-documents</option>
          <option value="unclaimed-inheritance-download-form">unclaimed-inheritance-download-form</option>
          <option value="free-iphone-16-scam-giveaway">free-iphone-16-scam-giveaway</option>
          <option value="login-to-cancel-illegal-subscription">login-to-cancel-illegal-subscription</option>

          <option value="urgent-court-summons-pdf">urgent-court-summons-pdf</option>
        </select>
      </div>
      <div>
        <label for="length">Link Length</label>
        <select id="length">
          <option value="">🎲 Random</option>
          <option value="short">Short</option>
          <option value="medium">Medium</option>
          <option value="long">Long</option>
          <option value="longer">Longer</option>
          <option value="very-very-long">Very Very Long</option>
        </select>
      </div>
    </div>

    <button class="btn" id="genBtn">Generate Shady Link</button>

    <div class="result-box" id="result"></div>
    <div class="actions" id="actions" style="display:none">
      <button id="copyBtn">📋 Copy</button>
      <button id="testBtn">🚀 Test</button>
    </div>
  </div>

  <div class="warn">
    This is a joke / prank tool. The generated links redirect to the URL you entered.<br>
    No malware, no viruses, no actual harm — just funny URLs to mess with your friends.<br>
    Made by <a href="https://github.com/jlaiii">jlaiii</a> ·
    <a href="https://github.com/jlaiii/ShadyURL">Source</a>
  </div>

  <script>
    const shadyPaths = [
      'download-free-creditcard-generator','verify-bank-account-now',
      'login-paypal-confirm-identity','install-trojan-hack-tool',
      'darkweb-market-access-key','claim-your-free-bitcoin',
      'update-social-security-info','activate-windows-crack',
      'free-vbucks-generator-2026','steal-wifi-password-tool',
      'access-neighbor-camera-feed','download-illegal-movies-free',
      'fake-id-generator-download','hack-facebook-password',
      'run-unknown-exe-file','enable-remote-desktop-backdoor',
      'free-porn-passwords-list','claim-lottery-winnings-now',
      'verify-irs-tax-refund','unlock-stolen-iphone-free',
      'ransomware-decrypt-payment','stolen-passport-for-sale',
      'your-computer-is-infected-click-here',
      'confirm-suspicious-wire-transfer',
      'unlock-exclusive-adult-content',
      'download-nigerian-prince-documents',
      'unclaimed-inheritance-download-form',
      'free-iphone-16-scam-giveaway',
      'login-to-cancel-illegal-subscription',
      'confirm-package-from-unknown-sender',
      'urgent-court-summons-pdf'
    ];

    const midSegments = [
      'confirm','verify','secure','auth','validate','process',
      'step2','step3','final','redirect','external','session'
    ];

    const longSegments = [
      'confirm-account-verification','secure-authentication-gateway',
      'identity-validation-process','external-resource-redirect',
      'session-token-validation','two-factor-bypass-module',
      'encrypted-payload-delivery','remote-access-terminal',
      'unauthorized-entry-point','suspicious-activity-detected'
    ];

    const urlIn = document.getElementById('url');
    const themeSel = document.getElementById('theme');
    const lenSel = document.getElementById('length');
    const genBtn = document.getElementById('genBtn');
    const resultBox = document.getElementById('result');
    const actions = document.getElementById('actions');
    const copyBtn = document.getElementById('copyBtn');
    const testBtn = document.getElementById('testBtn');

    function getBasePath() {
      let p = window.location.pathname;
      if (p.endsWith('index.html')) p = p.slice(0, -10);
      if (!p.endsWith('/')) p += '/';
      return p;
    }

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function makeShortPath(theme) {
      return theme + '/';
    }

    function makeMediumPath(theme) {
      const segs = [];
      for (let i = 0; i < 2; i++) segs.push(rand(midSegments));
      return theme + '/' + segs.join('/') + '/';
    }

    function makeLongPath(theme) {
      const segs = [];
      for (let i = 0; i < 4; i++) segs.push(rand(midSegments));
      return theme + '/' + segs.join('/') + '/';
    }

    function makeLongerPath(theme) {
      const segs = [];
      for (let i = 0; i < 6; i++) segs.push(rand(longSegments));
      return theme + '/' + segs.join('/') + '/';
    }

    function makeVeryVeryLongPath(theme) {
      const segs = [];
      for (let i = 0; i < 6; i++) segs.push(rand(longSegments));
      const junkId = Math.random().toString(36).substring(2, 14) + Math.random().toString(36).substring(2, 14);
      const q = '?ref=' + junkId + '&track=pixels&utm=scam&utm_source=darkweb&utm_medium=phishing&utm_campaign=harvest&session=' + junkId + '&verify=true&auth=required&step=final&endpoint=external&redirect=enabled&payload=encrypted';
      return theme + '/' + segs.join('/') + q + '/';
    }

    function generate() {
      let url = urlIn.value.trim();
      if (!url) { urlIn.focus(); return; }
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

      let theme = themeSel.value;
      if (!theme) theme = rand(shadyPaths);

      let length = lenSel.value;
      if (!length) length = rand(['short','medium','long','longer','very-very-long']);

      let path;
      switch (length) {
        case 'short':       path = makeShortPath(theme);       break;
        case 'medium':      path = makeMediumPath(theme);      break;
        case 'long':        path = makeLongPath(theme);        break;
        case 'longer':      path = makeLongerPath(theme);      break;
        case 'very-very-long': path = makeVeryVeryLongPath(theme); break;
        default:            path = makeMediumPath(theme);      break;
      }

      const b64 = btoa(url).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      const shadyUrl = window.location.origin + getBasePath() + path + '/#' + b64;

      resultBox.textContent = shadyUrl;
      resultBox.style.display = 'block';
      actions.style.display = 'flex';
    }

    genBtn.addEventListener('click', generate);
    urlIn.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(resultBox.textContent).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = '📋 Copy', 1200);
      });
    });

    testBtn.addEventListener('click', () => {
      window.open(resultBox.textContent, '_blank');
    });
  </script>
</body>
</html>
